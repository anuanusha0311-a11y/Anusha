{% extends "base.html" %}

{% block content %}

<h1>Books</h1>

<form method="GET" action="/books">
    <input type="text" name="search" placeholder="Search by title">
    <button type="submit">Search</button>
</form>

<br>

<a href="/add-book">
    <button>Add New Book</button>
</a>

<br><br>

<table>

<tr>
    <th>ID</th>
    <th>Title</th>
    <th>Author</th>
    <th>Quantity</th>
    <th>Action</th>
</tr>

{% for book in books %}

<tr>
    <td>{{ book.id }}</td>
    <td>{{ book.title }}</td>
    <td>{{ book.author }}</td>
    <td>{{ book.quantity }}</td>

    <td>
        <a href="/edit-book/{{ book.id }}">
            <button>Edit</button>
        </a>

        <a href="/delete-book/{{ book.id }}">
            <button>Delete</button>
        </a>
    </td>

</tr>

{% endfor %}

</table>

{% endblock %}
