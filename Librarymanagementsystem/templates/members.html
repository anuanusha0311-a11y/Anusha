{% extends "base.html" %}

{% block content %}

<h1>Members</h1>

<a href="/add-member">
    <button>Add Member</button>
</a>

<br><br>

<table>

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Email</th>
    <th>Phone</th>
</tr>

{% for member in members %}

<tr>
    <td>{{ member.id }}</td>
    <td>{{ member.name }}</td>
    <td>{{ member.email }}</td>
    <td>{{ member.phone }}</td>
</tr>

{% endfor %}

</table>

{% endblock %}
